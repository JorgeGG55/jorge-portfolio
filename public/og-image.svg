<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#00ff9a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1c1b22" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff9a"/>
      <stop offset="100%" stop-color="#00b36b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1c1b22"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Top bar logo -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" fill="#fff">
    <text x="80" y="100" font-size="36" font-weight="700">Jorge<tspan fill="#00ff9a" font-size="48">.</tspan></text>
  </g>

  <!-- Availability pill -->
  <g transform="translate(80, 175)">
    <rect x="0" y="0" width="320" height="44" rx="22" fill="#00ff9a" fill-opacity="0.12" stroke="#00ff9a" stroke-opacity="0.45" stroke-width="1.5"/>
    <circle cx="24" cy="22" r="6" fill="#00ff9a"/>
    <text x="44" y="29" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" fill="#00ff9a" font-weight="500">Disponible para trabajar</text>
  </g>

  <!-- Subtitle -->
  <text x="80" y="290" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="34" fill="#ffffff" fill-opacity="0.7">Desarrollador Full Stack</text>

  <!-- Main name -->
  <text x="80" y="410" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="110" font-weight="700" fill="#fff">Jorge</text>
  <text x="80" y="525" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="110" font-weight="700" fill="url(#accent)">Gravel</text>

  <!-- Stack tags -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" fill="#ffffff" fill-opacity="0.55">
    <text x="80" y="580">React  ·  Next.js  ·  TypeScript  ·  Node.js  ·  MongoDB  ·  Tailwind CSS</text>
  </g>

  <!-- URL -->
  <text x="1120" y="595" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" fill="#ffffff" fill-opacity="0.4">jorge-gravel.vercel.app</text>
</svg>
